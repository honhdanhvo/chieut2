<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thanh toán - Hồng Danh xe máy-SHOP</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Roboto', Arial, sans-serif;
      margin: 0;
      background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
      color: #333;
      line-height: 1.6;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
    }

    /* Header with Logo, Search, Cart */
    .header-flex {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: linear-gradient(135deg, #013e84 0%, #0256b3 100%);
      color: #fff;
      padding: 20px;
      border-radius: 0 0 15px 15px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
      flex-wrap: wrap;
      gap: 20px;
    }

    .logo {
      font-size: 2em;
      font-weight: 700;
      letter-spacing: 2px;
      text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.3);
    }

    .search-bar {
      display: flex;
      align-items: center;
      background: #fff;
      border-radius: 25px;
      padding: 5px;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
      transition: box-shadow 0.3s;
    }

    .search-bar:hover {
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
    }

    .search-bar input {
      border: none;
      outline: none;
      padding: 10px 15px;
      font-size: 1em;
      border-radius: 25px 0 0 25px;
      flex: 1;
    }

    .search-bar button {
      border: none;
      background: #FFD700;
      color: #013e84;
      padding: 10px 15px;
      border-radius: 0 25px 25px 0;
      cursor: pointer;
      font-size: 1em;
      font-weight: 500;
      transition: background 0.3s;
    }

    .search-bar button:hover {
      background: #FFC107;
    }

    .search-bar button::before {
      content: "🔍";
      margin-right: 5px;
    }

    .cart-responsive {
      margin-left: auto;
    }

    .cart-link {
      color: #fff;
      text-decoration: none;
      font-size: 1.2em;
      position: relative;
      transition: color 0.3s;
    }

    .cart-link:hover {
      color: #FFD700;
    }

    .cart-link::before {
      content: "🛒";
      margin-right: 5px;
    }

    .cart-count {
      background: #ff5252;
      color: #fff;
      border-radius: 50%;
      padding: 3px 8px;
      font-size: 0.9em;
      position: absolute;
      top: -10px;
      right: -20px;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
    }

    /* Sort Bar */
    .sort-bar {
      background: linear-gradient(135deg, #0256b3 0%, #0277bd 100%);
      padding: 10px 0;
      border-radius: 10px;
      margin: 20px 0;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
    }

    .sort-bar ul {
      display: flex;
      gap: 20px;
      margin: 0;
      padding: 0 20px;
      list-style: none;
      justify-content: center;
    }

    .sort-bar a {
      color: #fff;
      text-decoration: none;
      padding: 12px 20px;
      border-radius: 25px;
      transition: all 0.3s;
      font-weight: 500;
    }

    .sort-bar a:hover {
      background: #FFD700;
      color: #013e84;
      transform: translateY(-2px);
    }

    /* Category Nav */
    .category-nav {
      background: #e3eaf6;
      border-bottom: 2px solid #b3c6e0;
      padding: 10px 0;
      border-radius: 10px;
      margin-bottom: 20px;
    }

    .category-nav ul {
      display: flex;
      gap: 20px;
      margin: 0;
      padding: 0 20px;
      list-style: none;
      justify-content: center;
    }

    .category-nav a {
      color: #013e84;
      text-decoration: none;
      padding: 10px 15px;
      border-radius: 20px;
      transition: all 0.3s;
      font-weight: 500;
    }

    .category-nav a:hover {
      background: #ff5252;
      color: #fff;
      transform: translateY(-2px);
    }

    /* Checkout Container */
    .cart-container {
      max-width: 1000px;
      margin: 30px auto;
      background: #fff;
      border-radius: 15px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
      padding: 40px;
    }

    .cart-title {
      font-size: 2em;
      margin-bottom: 30px;
      color: #013e84;
      font-weight: 700;
      text-align: center;
    }

    .checkout-form {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .form-row {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }

    .form-group {
      flex: 1;
      min-width: 200px;
      display: flex;
      flex-direction: column;
    }

    .form-group label {
      font-weight: 500;
      margin-bottom: 8px;
      color: #013e84;
    }

    .form-group input,
    .form-group select,
    .form-group textarea {
      padding: 12px 15px;
      border: 1px solid #b3c6e0;
      border-radius: 8px;
      font-size: 1em;
      transition: all 0.3s;
      background: #f9f9f9;
    }

    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      border-color: #FFD700;
      background: #fff;
      box-shadow: 0 0 5px rgba(255, 215, 0, 0.5);
      outline: none;
    }

    .form-group textarea {
      resize: vertical;
      min-height: 80px;
    }

    .checkout-btn {
      display: block;
      margin: 20px auto 0;
      background: linear-gradient(135deg, #ff9800 0%, #ffb74d 100%);
      color: #fff;
      border: none;
      padding: 15px 40px;
      border-radius: 25px;
      font-size: 1.2em;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
    }

    .checkout-btn:hover {
      background: #FFD700;
      color: #013e84;
      transform: scale(1.05);
    }

    /* Footer */
    .footer-bar {
      background: linear-gradient(135deg, #013e84 0%, #0256b3 100%);
      color: #fff;
      text-align: center;
      padding: 20px;
      border-radius: 15px 15px 0 0;
      margin-top: 40px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
    }

    /* Menu Toggle for Mobile */
    .menu-toggle {
      display: none;
      margin: 20px auto;
      background: #0256b3;
      color: #fff;
      border: none;
      border-radius: 25px;
      padding: 12px 25px;
      font-size: 1em;
      cursor: pointer;
      transition: background 0.3s;
    }

    .menu-toggle:hover {
      background: #FFD700;
      color: #013e84;
    }

    /* Responsive */
    @media (max-width: 767px) {
      .container {
        padding: 0 10px;
      }

      .header-flex {
        flex-direction: column;
        text-align: center;
        padding: 15px;
      }

      .search-bar {
        width: 100%;
        max-width: 300px;
      }

      .cart-responsive {
        margin-left: 0;
        margin-top: 10px;
      }

      .menu-toggle {
        display: block;
      }

      .sort-bar,
      .category-nav {
        display: none;
      }

      .cart-container {
        padding: 20px;
      }

      .form-row {
        flex-direction: column;
        gap: 15px;
      }

      .form-group {
        min-width: auto;
      }

      .checkout-btn {
        width: 100%;
        margin: 20px 0 0;
        padding: 15px 0;
      }

      .sort-bar ul,
      .category-nav ul {
        flex-direction: column;
        align-items: center;
        gap: 10px;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <!-- Header -->
    <header class="header-flex">
      <div class="logo">Hồng Danh xe máy-SHOP</div>
      <form class="search-bar">
        <input type="text" placeholder="Tìm kiếm sản phẩm...">
        <button type="submit">Tìm</button>
      </form>
      <div class="cart-responsive">
        <a href="#" class="cart-link">Giỏ hàng <span class="cart-count">0</span></a>
      </div>
    </header>

    <!-- Menu Toggle for Mobile -->
    <button class="menu-toggle" onclick="toggleMenu()">☰ Menu</button>

    <!-- Sort Bar -->
    <nav class="sort-bar">
      <ul>
        <li><a href="asm.html">Trang chủ</a></li>
        <li><a href="asm_news.html">Tin tức</a></li>
        <li><a href="asm_detail.html">Chi tiết</a></li>
        <li><a href="asm_cart.html">Giỏ hàng</a></li>
        <li><a href="asm_Bill.html">Hóa đơn</a></li>
      </ul>
    </nav>

    <!-- Category Nav -->
    <nav class="category-nav">
      <ul>
        <li><a href="#">Xe số</a></li>
        <li><a href="#">Xe tay ga</a></li>
      </ul>
    </nav>

    <!-- Checkout Form -->
    <div class="cart-container">
      <div class="cart-title">Thanh toán đơn hàng</div>
      <form class="checkout-form">
        <div class="form-row">
          <div class="form-group">
            <label for="name">Họ và tên</label>
            <input type="text" id="name" name="name" required>
          </div>
          <div class="form-group">
            <label for="phone">Số điện thoại</label>
            <input type="tel" id="phone" name="phone" required pattern="[0-9]{10,11}">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required>
          </div>
          <div class="form-group">
            <label for="address">Địa chỉ nhận hàng</label>
            <input type="text" id="address" name="address" required>
          </div>
        </div>
        <div class="form-group">
          <label for="note">Ghi chú</label>
          <textarea id="note" name="note" rows="3" placeholder="Ghi chú cho đơn hàng (nếu có)"></textarea>
        </div>
        <div class="form-group">
          <label for="payment">Phương thức thanh toán</label>
          <select id="payment" name="payment" required>
            <option value="">-- Chọn phương thức --</option>
            <option value="cod">Thanh toán khi nhận hàng (COD)</option>
            <option value="bank">Chuyển khoản ngân hàng</option>
            <option value="momo">Ví MoMo</option>
          </select>
        </div>
        <button type="submit" class="checkout-btn">Xác nhận thanh toán</button>
      </form>
    </div>

    <!-- Footer -->
    <footer class="footer-bar">
          <p> &copy; 2025 Shop xe máy Hồng Danh | Liên hệ: cskhhongdanhxemay@-shop.com</p>
    </footer>
  </div>

  <script>
    function toggleMenu() {
      var sortBar = document.querySelector('.sort-bar');
      var catNav = document.querySelector('.category-nav');
      if (sortBar.style.display === 'block') {
        sortBar.style.display = 'none';
        catNav.style.display = 'none';
      } else {
        sortBar.style.display = 'block';
        catNav.style.display = 'block';
      }
    }
  </script>
</body>

</html>
